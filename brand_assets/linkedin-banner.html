<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1584px; height: 396px; overflow: hidden; background: #080808; }

.banner {
  width: 1584px; height: 396px;
  display: flex; align-items: center;
  position: relative;
}

/* Large logo mark on the left */
.logo-mark {
  flex-shrink: 0;
  width: 380px; height: 396px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

/* Right content area */
.right {
  flex: 1;
  display: flex; flex-direction: column; justify-content: center;
  padding: 40px 52px 40px 40px;
  gap: 0;
  height: 100%;
}

.wordmark {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.wordmark-text {
  font-family: 'Inter', sans-serif; font-weight: 800;
  font-size: 28px; letter-spacing: -0.03em; color: #F0EEE9; line-height: 1;
}
.wordmark-text span { color: #D42B45; }

.tagline {
  font-family: 'Inter', sans-serif; font-weight: 800;
  font-size: 112px; letter-spacing: -0.04em; line-height: 0.90; color: #F0EEE9;
}
.tagline .ac { color: #D42B45; }

.services {
  display: flex; gap: 12px; align-items: center;
  margin-top: 28px;
}
.service-tag {
  font-family: 'Inter', sans-serif; font-weight: 600;
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  color: #F0EEE9;
  border: 1px solid rgba(212,43,69,0.6);
  border-radius: 3px;
  padding: 7px 14px;
  white-space: nowrap;
}

/* Vertical separator between logo area and content */
.sep {
  width: 1px; height: 200px; background: #1E1E1E;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div class="banner">

  <!-- Big logo mark left -->
  <div class="logo-mark">
    <svg width="280" height="280" viewBox="0 0 36 36" fill="none">
      <!-- Top-left block -->
      <rect x="0" y="0" width="16" height="16" rx="3" fill="#D42B45" opacity="0.9"/>
      <!-- Top-right block -->
      <rect x="20" y="0" width="16" height="16" rx="3" fill="#D42B45" opacity="0.25"/>
      <!-- Bottom-left block -->
      <rect x="0" y="20" width="16" height="16" rx="3" fill="#D42B45" opacity="0.25"/>
      <!-- Bottom-right block -->
      <rect x="20" y="20" width="16" height="16" rx="3" fill="#A01E32" opacity="0.9"/>
      <!-- Connector lines -->
      <line x1="16" y1="8" x2="20" y2="8" stroke="#D42B45" stroke-width="1.5" opacity="0.6"/>
      <line x1="8" y1="16" x2="8" y2="20" stroke="#D42B45" stroke-width="1.5" opacity="0.6"/>
      <line x1="28" y1="16" x2="28" y2="20" stroke="#D42B45" stroke-width="1.5" opacity="0.6"/>
      <line x1="16" y1="28" x2="20" y2="28" stroke="#A01E32" stroke-width="1.5" opacity="0.6"/>
    </svg>
  </div>

  <div class="sep"></div>

  <!-- Right: wordmark + tagline + services -->
  <div class="right">
    <div class="wordmark">
      <svg width="22" height="22" viewBox="0 0 36 36" fill="none">
        <rect x="0" y="0" width="16" height="16" rx="3" fill="#D42B45" opacity="0.9"/>
        <rect x="20" y="0" width="16" height="16" rx="3" fill="#D42B45" opacity="0.3"/>
        <rect x="0" y="20" width="16" height="16" rx="3" fill="#D42B45" opacity="0.3"/>
        <rect x="20" y="20" width="16" height="16" rx="3" fill="#A01E32" opacity="0.9"/>
        <line x1="16" y1="8" x2="20" y2="8" stroke="#D42B45" stroke-width="1.5"/>
        <line x1="8" y1="16" x2="8" y2="20" stroke="#D42B45" stroke-width="1.5"/>
        <line x1="28" y1="16" x2="28" y2="20" stroke="#D42B45" stroke-width="1.5"/>
        <line x1="16" y1="28" x2="20" y2="28" stroke="#A01E32" stroke-width="1.5"/>
      </svg>
      <div class="wordmark-text">Vroomans<span>BI</span></div>
    </div>

    <div class="tagline">
      I build your<br>data <span class="ac">foundation.</span>
    </div>

    <div class="services">
      <div class="service-tag">Dataplatform &amp; Consulting</div>
      <div class="service-tag">Analytics</div>
      <div class="service-tag">AI &amp; Automatisering</div>
    </div>
  </div>

</div>

</body>
</html>
